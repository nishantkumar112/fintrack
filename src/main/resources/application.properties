## CORS: comma-separated origins for the browser (Postman ignores CORS).
## Add your production UI URL when you deploy (e.g. https://app.example.com).
#app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
spring.application.name=fintrack-dashboard

# =========================
# SERVER (RENDER COMPATIBLE)
# =========================
server.port=${PORT:8080}
server.address=0.0.0.0

# =========================
# DATABASE (PRODUCTION - RENDER POSTGRES)
# =========================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# CORS (FRONTEND ACCESS)
# =========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

# =========================
# LOGGING (PRODUCTION SAFE)
# =========================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF