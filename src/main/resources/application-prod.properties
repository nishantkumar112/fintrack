# =========================================================
# SERVER
# =========================================================

server.port=${PORT:8080}
server.address=0.0.0.0

# Graceful shutdown
server.shutdown=graceful

# =========================================================
# APPLICATION
# =========================================================

spring.application.name=fintrack-dashboard

# =========================================================
# DATABASE
# =========================================================

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

spring.datasource.username=${DB_USERNAME}

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# HIKARI CONNECTION POOL
# =========================================================

spring.datasource.hikari.pool-name=FinTrackHikariPool

spring.datasource.hikari.maximum-pool-size=15

spring.datasource.hikari.minimum-idle=5

spring.datasource.hikari.idle-timeout=300000

spring.datasource.hikari.max-lifetime=1200000

spring.datasource.hikari.connection-timeout=20000

spring.datasource.hikari.leak-detection-threshold=60000

# =========================================================
# JPA / HIBERNATE
# =========================================================

# NEVER use create/create-drop in production
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false

# Hibernate optimization
spring.jpa.properties.hibernate.jdbc.batch_size=25

spring.jpa.properties.hibernate.order_inserts=true

spring.jpa.properties.hibernate.order_updates=true

spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true



# =========================================================
# CORS
# =========================================================

app.cors.allowed-origins=${CORS_ORIGINS}

# =========================================================
# JWT
# =========================================================

jwt.secret=${JWT_SECRET}

# 15 minutes
jwt.expiration=900000

# 7 days
jwt.refresh-expiration=604800000

# =========================================================
# MAIL
# =========================================================

spring.mail.host=${MAIL_HOST}

spring.mail.port=${MAIL_PORT:587}

spring.mail.username=${MAIL_USERNAME}

spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000

spring.mail.properties.mail.smtp.timeout=5000

spring.mail.properties.mail.smtp.writetimeout=5000

# =========================================================
# QUARTZ SCHEDULER
# =========================================================

spring.quartz.job-store-type=jdbc

# NEVER auto-create schema in production
spring.quartz.jdbc.initialize-schema=never

spring.quartz.wait-for-jobs-to-complete-on-shutdown=true

# =========================================================
# QUARTZ INSTANCE
# =========================================================

spring.quartz.properties.org.quartz.scheduler.instanceName=FinTrackScheduler

spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO

# =========================================================
# QUARTZ THREAD POOL
# =========================================================

spring.quartz.properties.org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool

spring.quartz.properties.org.quartz.threadPool.threadCount=5

spring.quartz.properties.org.quartz.threadPool.threadPriority=5

# =========================================================
# QUARTZ JOB STORE
# =========================================================

spring.quartz.properties.org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX

spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

spring.quartz.properties.org.quartz.jobStore.useProperties=false

spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_

# Cluster-safe scheduling
spring.quartz.properties.org.quartz.jobStore.isClustered=true

spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000

spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000

# =========================================================
# FILE UPLOAD
# =========================================================

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB

# =========================================================
# JACKSON
# =========================================================

spring.jackson.serialization.write-dates-as-timestamps=false

spring.jackson.time-zone=Asia/Kolkata

# =========================================================
# ACTUATOR
# =========================================================

management.endpoints.web.exposure.include=health,info,metrics

management.endpoint.health.show-details=never

# =========================================================
# LOGGING
# =========================================================

logging.level.root=INFO

logging.level.org.springframework=INFO

logging.level.org.springframework.security=WARN

logging.level.org.hibernate.SQL=OFF

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

logging.level.org.quartz=INFO

logging.level.com.fintrack.fintrack_dashboard=INFO

# =========================================================
# COMPRESSION
# =========================================================

server.compression.enabled=true

server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

server.compression.min-response-size=1024

# =========================================================
# HTTP ENCODING
# =========================================================

server.servlet.encoding.charset=UTF-8

server.servlet.encoding.enabled=true

server.servlet.encoding.force=true